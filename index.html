<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#f7f2e8">
  <title>David & Raquel · 22 de noviembre de 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <section class="hero" id="portada" aria-labelledby="titulo-principal">
      <div class="hero__content">
        <p class="hero__eyebrow">Nos casamos</p>
        <h1 id="titulo-principal" class="hero__names">
          <span>David</span><span class="hero__ampersand">&</span><span>Raquel</span>
        </h1>
        <div class="hero__divider" aria-hidden="true"></div>
        <p class="hero__date"><span>22</span><span>noviembre</span><span>2026</span></p>
        <p class="hero__time">17:00 horas</p>
        <button class="primary-button" id="openInvitation" type="button">Abrir invitación</button>
      </div>
    </section>

    <section class="countdown-section" id="cuenta-atras" aria-labelledby="countdown-title">
      <div class="countdown-section__inner">
        <h2 id="countdown-title">Cuenta atrás</h2>
        <p class="countdown-section__script">Faltan</p>
        <div class="countdown" role="timer" aria-live="polite" aria-label="Tiempo restante para la boda">
          <article class="countdown__item"><strong id="days">000</strong><span>Días</span></article>
          <article class="countdown__item"><strong id="hours">00</strong><span>Horas</span></article>
          <article class="countdown__item"><strong id="minutes">00</strong><span>Min</span></article>
          <article class="countdown__item"><strong id="seconds">00</strong><span>Seg</span></article>
        </div>
        <p class="countdown-section__closing">para celebrar juntos nuestro gran día</p>
      </div>
    </section>

    <section class="story-intro" id="historia" aria-labelledby="story-title">
      <div class="story-intro__inner">
        <p class="section-kicker">Nuestra historia</p>
        <h2 id="story-title">Cómo empezó todo</h2>
        <div class="section-divider" aria-hidden="true"></div>
        <p>Muy pronto añadiremos aquí los momentos más especiales de vuestra historia.</p>
      </div>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
